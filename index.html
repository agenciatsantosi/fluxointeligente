    <title>FluxoInteligente - Automação</title>
    <script>
      (function() {
        const params = new URLSearchParams(window.location.search);
        const videoSlug = params.get('video');
        if (videoSlug) {
          // Immediately hide page content to avoid home page flash/flicker
          document.documentElement.style.display = 'none';
          
          // Call the public short-links API to fetch destination
          fetch('/api/public/short-links/' + videoSlug)
            .then(res => res.json())
            .then(data => {
              if (data.success && data.targetUrl) {
                // Success! Instantly redirect to the Shopee or custom destination URL
                window.location.replace(data.targetUrl);
              } else {
                // Restore normal visibility if the link is not found/expired
                document.documentElement.style.display = '';
              }
            })
            .catch(err => {
              // Restore normal visibility if offline or error
              document.documentElement.style.display = '';
            });
        }
      })();
    </script>
